name: syncteam
description: "SyncTeam Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.0
  google_fonts: ^6.2.1
  riverpod_annotation: ^2.6.1
  timeago: ^3.7.1
  uuid: ^4.5.3
  intl: ^0.20.2
  firebase_core: ^3.11.0
  firebase_messaging: ^15.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  custom_lint: ^0.7.1
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
